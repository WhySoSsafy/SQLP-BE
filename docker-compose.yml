services:
  db:
    image: postgres:16
    container_name: sqlp-postgres
    environment:
      POSTGRES_USER: sqlp
      POSTGRES_PASSWORD: sqlp
      POSTGRES_DB: sqlp
    ports:
      - "5432:5432"
    volumes:
      - sqlp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqlp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sqlp_pgdata:
